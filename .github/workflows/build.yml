name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install server deps
        run: cd server && npm ci
      - name: Lint server
        run: cd server && npx eslint src/ --ext .js || true

  build-client:
    runs-on: windows-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install client deps
        run: cd client && npm ci
      - name: Build client
        run: cd client && npx vite build
      - name: Build Electron
        run: cd client && npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blesk-installer
          path: client/dist/*.exe

  release:
    runs-on: ubuntu-latest
    needs: build-client
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blesk-installer
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.exe'
          generate_release_notes: true

  deploy-server:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/blesk/server
            git pull origin master
            npm install --production
            npx prisma db push --skip-generate
            pm2 restart blesk-server
            sleep 3
            curl -sf http://localhost:3000/health || (pm2 logs blesk-server --lines 20 && exit 1)
