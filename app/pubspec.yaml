name: blesk
description: "blesk — приватный мессенджер"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # UI / animations
  flutter_animate: ^4.5.2
  bitsdojo_window: ^0.1.6
  solar_icons: ^0.0.4

  # Audio (disabled — SoundEngine code preserved for future)
  audioplayers: ^6.6.0

  # Utils
  path_provider: ^2.1.5
  package_info_plus: ^8.1.3
  desktop_drop: ^0.7.0
  pasteboard: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  shaders:
    - assets/shaders/metaball.frag

  assets:
    - assets/logo/
    - assets/fonts/

  fonts:
    - family: Nekst
      fonts:
        - asset: assets/fonts/Nekst-Thin.ttf
          weight: 100
        - asset: assets/fonts/Nekst-Light.ttf
          weight: 300
        - asset: assets/fonts/Nekst-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nekst-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nekst-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nekst-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nekst-Black.ttf
          weight: 900
    - family: Onest
      fonts:
        - asset: assets/fonts/Onest-Regular.ttf
          weight: 400
        - asset: assets/fonts/Onest-Medium.ttf
          weight: 500
        - asset: assets/fonts/Onest-SemiBold.ttf
          weight: 600
