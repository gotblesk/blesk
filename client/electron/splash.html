<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>blesk</title>
<style>
  @font-face {
    font-family: 'Manrope';
    src: url('./lib/manrope-var.woff2') format('woff2');
    font-weight: 300 800;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 600px;
    height: 400px;
    overflow: hidden;
    background: transparent;
    font-family: 'Manrope', -apple-system, system-ui, sans-serif;
    -webkit-app-region: drag;
    user-select: none;
  }

  #splash {
    width: 100%;
    height: 100%;
    position: relative;
    background: #0a0a0f;
    border-radius: 20px;
    overflow: hidden;
  }

  /* ═══════ METABALL BACKGROUND ═══════ */
  .orbs {
    position: absolute;
    inset: 0;
    z-index: 0;
    filter: blur(60px);
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    will-change: transform;
  }

  .orb-1 {
    width: 200px;
    height: 200px;
    background: rgba(200, 255, 0, 0.2);
    top: -30px;
    left: -40px;
    animation: orbFloat1 8s ease-in-out infinite;
  }

  .orb-2 {
    width: 160px;
    height: 160px;
    background: rgba(200, 255, 0, 0.15);
    bottom: -20px;
    right: -30px;
    animation: orbFloat2 10s ease-in-out infinite;
  }

  .orb-3 {
    width: 120px;
    height: 120px;
    background: rgba(0, 212, 255, 0.1);
    top: 50%;
    left: 60%;
    transform: translate(-50%, -50%);
    animation: orbFloat3 7s ease-in-out infinite;
  }

  .orb-4 {
    width: 100px;
    height: 100px;
    background: rgba(255, 0, 106, 0.07);
    bottom: 20%;
    left: 15%;
    animation: orbFloat4 9s ease-in-out infinite;
  }

  @keyframes orbFloat1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, 20px) scale(1.1); }
    66% { transform: translate(-10px, 30px) scale(0.95); }
  }

  @keyframes orbFloat2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-25px, -15px) scale(1.05); }
    66% { transform: translate(15px, -25px) scale(0.9); }
  }

  @keyframes orbFloat3 {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-40%, -60%) scale(1.15); }
  }

  @keyframes orbFloat4 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(20px, -10px) scale(1.1); }
  }

  /* ═══════ CONTENT ═══════ */
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ═══════ LOGO ═══════ */
  .logo {
    width: 80px;
    height: 80px;
    opacity: 0;
    animation: logoAppear 1s ease-out 0.3s forwards, logoPulse 3s ease-in-out 1.3s infinite;
  }

  @keyframes logoAppear {
    from {
      opacity: 0;
      transform: scale(0.7);
      filter: drop-shadow(0 0 0 rgba(200, 255, 0, 0));
    }
    to {
      opacity: 1;
      transform: scale(1);
      filter: drop-shadow(0 0 25px rgba(200, 255, 0, 0.25));
    }
  }

  @keyframes logoPulse {
    0%, 100% {
      transform: scale(1);
      filter: drop-shadow(0 0 25px rgba(200, 255, 0, 0.25));
    }
    50% {
      transform: scale(1.05);
      filter: drop-shadow(0 0 35px rgba(200, 255, 0, 0.4));
    }
  }

  /* ═══════ TAGLINE ═══════ */
  .tagline {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.2);
    letter-spacing: 3.5px;
    text-transform: uppercase;
    margin-top: 14px;
    opacity: 0;
    animation: fadeIn 0.6s ease-out 1s forwards;
  }

  /* ═══════ LOADING DOTS ═══════ */
  .dots {
    display: flex;
    gap: 8px;
    margin-top: 28px;
    opacity: 0;
    animation: fadeIn 0.4s ease-out 0.5s forwards;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(200, 255, 0, 0.3);
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  .dot:nth-child(4) { animation-delay: 0.6s; }

  @keyframes dotPulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); background: rgba(200, 255, 0, 1); }
  }

  /* ═══════ STATUS ═══════ */
  .status {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.2);
    margin-top: 10px;
    transition: opacity 0.3s;
    min-height: 14px;
    opacity: 0;
    animation: fadeIn 0.4s ease-out 0.5s forwards;
  }

  /* ═══════ VERSION ═══════ */
  .version {
    position: absolute;
    bottom: 14px;
    font-size: 8px;
    color: rgba(200, 255, 0, 0.2);
    opacity: 0;
    animation: fadeIn 0.4s ease-out 1.2s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* ═══════ EXIT ANIMATION ═══════ */
  #splash.expand-out {
    animation: splashExpandOut 0.6s ease-in forwards;
  }

  @keyframes splashExpandOut {
    to {
      transform: scale(1.3);
      opacity: 0;
      border-radius: 8px;
    }
  }

  /* ═══════ ERROR STATE ═══════ */
  .error-state .dots {
    display: none;
  }

  .error-state .status {
    color: rgba(239, 68, 68, 0.7);
  }

  .retry-btn {
    display: none;
    margin-top: 14px;
    padding: 8px 24px;
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid rgba(239, 68, 68, 0.25);
    border-radius: 10px;
    color: rgba(239, 68, 68, 0.85);
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    -webkit-app-region: no-drag;
    transition: background 0.2s, border-color 0.2s;
  }

  .retry-btn:hover {
    background: rgba(239, 68, 68, 0.2);
    border-color: rgba(239, 68, 68, 0.4);
  }

  .error-state .retry-btn {
    display: inline-block;
  }

  /* ═══════ REDUCED MOTION ═══════ */
  @media (prefers-reduced-motion: reduce) {
    .dot { animation: none; opacity: 0.5; }
    .logo { animation: none; opacity: 1; filter: drop-shadow(0 0 25px rgba(200, 255, 0, 0.25)); }
    .tagline, .dots, .status, .version { animation: none; opacity: 1; }
    .orb { animation: none; }
  }
</style>
</head>
<body>
<div id="splash">
  <!-- Metaball background orbs -->
  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <img class="logo" src="../dist/blesk.png" alt="blesk"
         onerror="this.src='../public/blesk.png'">
    <div class="tagline">твой блеск. твои правила.</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="status" id="status">Запуск...</div>
    <button class="retry-btn" id="retryBtn">Повторить</button>
    <div class="version" id="version"></div>
  </div>
</div>

<script>
(async function() {
  'use strict';

  // ═══════ VERSION (async) ═══════
  try {
    const ver = await window.splashApi?.version?.();
    if (ver) document.getElementById('version').textContent = 'v' + ver;
  } catch(e) {}

  // ═══════ EXPAND-OUT from main process ═══════
  window.splashApi?.onExpandOut?.(() => {
    document.getElementById('splash').classList.add('expand-out');
  });

  // ═══════ STATUS ROTATION ═══════
  const STATUSES = [
    'Запуск...',
    'Подключение к серверу...',
    'Загрузка профиля...',
    'Подготовка интерфейса...',
    'Почти готово...'
  ];
  const EASTER_EGGS = [
    'Полируем интерфейс...',
    'Настраиваем блеск...',
    'Прогреваем пиксели...',
    'Загружаем уют...'
  ];

  let statusIdx = 0;
  const statusEl = document.getElementById('status');

  const statusInterval = setInterval(() => {
    statusIdx++;
    if (statusIdx >= STATUSES.length) {
      clearInterval(statusInterval);
      return;
    }

    let text = STATUSES[statusIdx];
    if (statusIdx >= 1 && statusIdx <= 3 && Math.random() < 0.1) {
      text = EASTER_EGGS[Math.floor(Math.random() * EASTER_EGGS.length)];
    }

    statusEl.style.opacity = '0';
    setTimeout(() => {
      statusEl.textContent = text;
      statusEl.style.opacity = '1';
    }, 150);
  }, 600);

  // ═══════ READY SIGNAL ═══════
  // Send ready after statuses finish (~3s)
  let readySent = false;

  setTimeout(() => {
    readySent = true;
    window.splashApi?.ready();
  }, 3000);

  // Если через 8 сек после ready основное окно не загрузилось — показать ошибку
  setTimeout(() => {
    const splash = document.getElementById('splash');
    if (splash && !splash.classList.contains('expand-out')) {
      splash.classList.add('error-state');
      statusEl.textContent = 'Не удалось загрузить приложение';
      statusEl.style.opacity = '1';
    }
  }, 8000);

  // Кнопка «Повторить» — перезапуск загрузки
  document.getElementById('retryBtn').addEventListener('click', () => {
    const splash = document.getElementById('splash');
    splash.classList.remove('error-state');
    statusEl.textContent = 'Повторная загрузка...';
    statusEl.style.opacity = '1';
    window.splashApi?.retry();
  });

})();
</script>
</body>
</html>
