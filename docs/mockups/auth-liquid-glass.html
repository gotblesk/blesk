<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blesk — Liquid Glass Auth</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Unbounded:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08060f;
    --accent: #c8ff00;
    --text: rgba(255, 255, 255, 0.85);
    --text-muted: rgba(255, 255, 255, 0.25);
    --glass-bg: rgba(255, 255, 255, 0.04);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-highlight: rgba(255, 255, 255, 0.12);
    --font-ui: 'Unbounded', sans-serif;
    --font-brand: 'Syne', sans-serif;
    --font-logo: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }

  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    width: 100vw;
    height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ===== ANIMATED ORB BACKGROUND ===== */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }

  .orb--green {
    width: 500px; height: 500px;
    background: var(--accent);
    opacity: 0.12;
    top: -15%; left: -5%;
    animation: orbDrift1 12s ease-in-out infinite alternate;
  }
  .orb--cyan {
    width: 400px; height: 400px;
    background: #00d4ff;
    opacity: 0.08;
    bottom: -10%; right: -5%;
    animation: orbDrift2 15s ease-in-out infinite alternate;
  }
  .orb--pink {
    width: 350px; height: 350px;
    background: #ff006a;
    opacity: 0.06;
    top: 40%; right: 20%;
    animation: orbDrift3 18s ease-in-out infinite alternate;
  }

  @keyframes orbDrift1 {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(60px, 40px) scale(1.15); }
  }
  @keyframes orbDrift2 {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-40px, -50px) scale(1.1); }
  }
  @keyframes orbDrift3 {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, -30px) scale(0.9); }
  }

  /* ===== LIQUID GLASS BLOBS (декоративные) ===== */
  .liquid-blob {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
  }

  .liquid-blob--1 {
    width: 180px; height: 180px;
    top: 12%; left: 18%;
    background: radial-gradient(circle at 30% 30%,
      rgba(255, 255, 255, 0.08) 0%,
      rgba(255, 255, 255, 0.02) 50%,
      transparent 70%
    );
    border: 1px solid rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(20px);
    animation: blobFloat1 8s ease-in-out infinite alternate, blobMorph1 12s ease-in-out infinite;
  }

  .liquid-blob--2 {
    width: 120px; height: 120px;
    bottom: 18%; right: 15%;
    background: radial-gradient(circle at 40% 30%,
      rgba(200, 255, 0, 0.06) 0%,
      rgba(200, 255, 0, 0.01) 50%,
      transparent 70%
    );
    border: 1px solid rgba(200, 255, 0, 0.06);
    backdrop-filter: blur(16px);
    animation: blobFloat2 10s ease-in-out infinite alternate, blobMorph2 14s ease-in-out infinite;
  }

  .liquid-blob--3 {
    width: 90px; height: 90px;
    top: 65%; left: 10%;
    background: radial-gradient(circle at 50% 40%,
      rgba(0, 212, 255, 0.05) 0%,
      transparent 60%
    );
    border: 1px solid rgba(0, 212, 255, 0.04);
    backdrop-filter: blur(12px);
    animation: blobFloat3 7s ease-in-out infinite alternate, blobMorph3 10s ease-in-out infinite;
  }

  .liquid-blob--4 {
    width: 60px; height: 60px;
    top: 20%; right: 22%;
    background: radial-gradient(circle at 50% 50%,
      rgba(255, 255, 255, 0.06) 0%,
      transparent 60%
    );
    border: 1px solid rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(10px);
    animation: blobFloat4 9s ease-in-out infinite alternate, blobMorph2 11s ease-in-out infinite;
  }

  @keyframes blobFloat1 {
    to { transform: translate(20px, -15px); }
  }
  @keyframes blobFloat2 {
    to { transform: translate(-15px, 20px); }
  }
  @keyframes blobFloat3 {
    to { transform: translate(10px, -20px); }
  }
  @keyframes blobFloat4 {
    to { transform: translate(-10px, 15px); }
  }

  @keyframes blobMorph1 {
    0%, 100% { border-radius: 50% 40% 55% 45% / 45% 55% 40% 50%; }
    25% { border-radius: 45% 55% 40% 50% / 50% 40% 55% 45%; }
    50% { border-radius: 55% 45% 50% 40% / 40% 50% 45% 55%; }
    75% { border-radius: 40% 50% 45% 55% / 55% 45% 50% 40%; }
  }
  @keyframes blobMorph2 {
    0%, 100% { border-radius: 40% 55% 45% 50% / 50% 45% 55% 40%; }
    33% { border-radius: 55% 40% 50% 45% / 45% 50% 40% 55%; }
    66% { border-radius: 45% 50% 40% 55% / 55% 40% 50% 45%; }
  }
  @keyframes blobMorph3 {
    0%, 100% { border-radius: 50% 45% 55% 40% / 40% 55% 45% 50%; }
    50% { border-radius: 40% 55% 45% 50% / 50% 45% 55% 40%; }
  }

  /* ===== BRAND INTRO (Phase 1) ===== */
  .brand-intro {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
  }

  .brand-intro__logo {
    font-family: var(--font-logo);
    font-size: 72px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -4px;
    opacity: 0;
    animation: brandLogoIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    text-shadow: 0 0 60px rgba(200, 255, 0, 0.2);
  }
  .brand-intro__logo span { color: var(--accent); }

  @keyframes brandLogoIn {
    from { opacity: 0; transform: scale(0.7); filter: blur(12px); }
    to { opacity: 1; transform: scale(1); filter: blur(0); }
  }

  .brand-intro__name {
    font-family: var(--font-brand);
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 6px;
    margin-top: -4px;
    opacity: 0;
    animation: brandNameIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
  }
  .brand-intro__name span { color: var(--accent); }

  @keyframes brandNameIn {
    from { opacity: 0; transform: translateY(10px); filter: blur(6px); }
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  .brand-intro__tagline {
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 12px;
    opacity: 0;
    animation: brandTagIn 0.6s ease 1.2s forwards;
  }

  @keyframes brandTagIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Phase 2: intro fades up, card appears */
  .brand-intro--exit {
    animation: brandExit 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes brandExit {
    0% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    100% { opacity: 0; transform: translateY(-30px) scale(0.95); filter: blur(8px); }
  }

  /* ===== MAIN GLASS CARD ===== */
  .glass-card {
    position: relative;
    z-index: 10;
    width: 400px;
    padding: 36px 32px 28px;
    background: linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.06) 0%,
      rgba(255, 255, 255, 0.02) 50%,
      rgba(255, 255, 255, 0.04) 100%
    );
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
    border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.04) inset,
      0 20px 60px rgba(0, 0, 0, 0.4),
      0 0 100px rgba(200, 255, 0, 0.03);

    /* Hidden initially, shown after intro */
    opacity: 0;
    transform: translateY(40px) scale(0.92);
    filter: blur(10px);
    transition: none;
  }

  .glass-card--visible {
    animation: glassCardIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes glassCardIn {
    0% {
      opacity: 0;
      transform: translateY(40px) scale(0.92);
      filter: blur(10px);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }
  }

  /* Specular highlight (top edge glow) */
  .glass-card::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      rgba(255, 255, 255, 0.3),
      transparent
    );
    border-radius: 1px;
  }

  /* Inner glow */
  .glass-card::after {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px; bottom: -1px;
    border-radius: 28px;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.05) 0%,
      transparent 40%
    );
    pointer-events: none;
    z-index: -1;
  }

  /* ===== LOGO ===== */
  .auth-logo {
    text-align: center;
    margin-bottom: 6px;
    animation: logoFloat 4s ease-in-out infinite;
  }

  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .auth-logo__icon {
    font-family: var(--font-logo);
    font-size: 52px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -3px;
    text-shadow: 0 0 40px rgba(200, 255, 0, 0.15);
    display: inline-block;
  }
  .auth-logo__icon span {
    color: var(--accent);
  }

  .auth-logo__name {
    font-family: var(--font-brand);
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
    margin-top: -2px;
  }
  .auth-logo__name span {
    color: var(--accent);
  }

  .auth-tagline {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* ===== GLASS TABS ===== */
  .auth-tabs {
    display: flex;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 14px;
    padding: 3px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .auth-tab {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    border-radius: 11px;
    cursor: pointer;
    color: rgba(255, 255, 255, 0.3);
    transition: color 0.4s ease;
    border: none;
    background: none;
    position: relative;
    z-index: 2;
  }

  .auth-tab--active {
    color: var(--accent);
  }

  /* Sliding glass indicator for tabs */
  .auth-tab-indicator {
    position: absolute;
    top: 3px;
    height: calc(100% - 6px);
    width: calc(50% - 3px);
    border-radius: 11px;
    background: rgba(200, 255, 0, 0.08);
    border: 1px solid rgba(200, 255, 0, 0.12);
    box-shadow: 0 0 20px rgba(200, 255, 0, 0.05);
    transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 1;
  }

  /* ===== GLASS INPUTS ===== */
  .auth-field {
    margin-bottom: 14px;
    animation: fieldSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .auth-field:nth-child(1) { animation-delay: 0.3s; }
  .auth-field:nth-child(2) { animation-delay: 0.45s; }
  .auth-field:nth-child(3) { animation-delay: 0.6s; }

  @keyframes fieldSlideIn {
    from {
      opacity: 0;
      transform: translateY(16px);
      filter: blur(4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }
  }

  .auth-label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
    padding-left: 4px;
  }

  .auth-input-wrap {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
  }

  /* Liquid border effect */
  .auth-input-wrap::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 14px;
    background: linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.1) 0%,
      rgba(255, 255, 255, 0.03) 40%,
      rgba(255, 255, 255, 0.06) 100%
    );
    z-index: -1;
    transition: all 0.4s ease;
  }

  .auth-input-wrap:focus-within::before {
    background: linear-gradient(
      135deg,
      rgba(200, 255, 0, 0.25) 0%,
      rgba(200, 255, 0, 0.05) 40%,
      rgba(200, 255, 0, 0.15) 100%
    );
  }

  .auth-input {
    width: 100%;
    padding: 13px 16px;
    border-radius: 14px;
    border: none;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(16px);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13px;
    outline: none;
    transition: all 0.4s ease;
  }

  .auth-input::placeholder {
    color: rgba(255, 255, 255, 0.15);
  }

  .auth-input:focus {
    background: rgba(200, 255, 0, 0.03);
    box-shadow: 0 0 30px rgba(200, 255, 0, 0.06);
  }

  /* ===== ERROR ===== */
  .auth-error {
    font-size: 11px;
    color: var(--danger);
    padding: 8px 12px;
    background: rgba(239, 68, 68, 0.06);
    border: 1px solid rgba(239, 68, 68, 0.12);
    border-radius: 10px;
    margin-bottom: 14px;
    backdrop-filter: blur(10px);
  }

  /* ===== GLASS BUTTON ===== */
  .auth-btn-wrap {
    animation: fieldSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
  }

  .auth-btn {
    width: 100%;
    padding: 14px 0;
    border-radius: 14px;
    border: none;
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 4px 24px rgba(200, 255, 0, 0.25);
  }

  .auth-btn:hover {
    box-shadow: 0 6px 32px rgba(200, 255, 0, 0.35);
    transform: translateY(-1px);
  }

  .auth-btn:active {
    transform: translateY(0) scale(0.98);
  }

  /* Liquid shimmer on button */
  .auth-btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.2),
      transparent
    );
    animation: btnShimmer 3s ease-in-out infinite;
  }

  @keyframes btnShimmer {
    0% { left: -100%; }
    40%, 100% { left: 200%; }
  }

  /* ===== FOOTER ===== */
  .auth-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.12);
    animation: fieldSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both;
  }

  /* ===== FLOATING GLASS REFLECTIONS ===== */
  .glass-reflect {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255, 255, 255, 0.03) 0%,
      transparent 70%
    );
    pointer-events: none;
    z-index: 5;
  }

  .glass-reflect--1 {
    width: 300px; height: 300px;
    top: -100px; right: -80px;
    animation: reflectFloat 6s ease-in-out infinite alternate;
  }
  .glass-reflect--2 {
    width: 200px; height: 200px;
    bottom: -60px; left: -50px;
    animation: reflectFloat 8s ease-in-out infinite alternate-reverse;
  }

  @keyframes reflectFloat {
    to { transform: translate(10px, -10px); }
  }

  /* ===== VERSION BADGE ===== */
  .version-badge {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: rgba(255, 255, 255, 0.08);
    letter-spacing: 1px;
    z-index: 50;
    animation: fieldSlideIn 0.6s ease 1.2s both;
  }

  /* ===== REPLAY ===== */
  .replay-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    padding: 8px 14px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    z-index: 200;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  .replay-btn:hover {
    background: rgba(200, 255, 0, 0.06);
    border-color: rgba(200, 255, 0, 0.2);
    color: var(--accent);
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <!-- Background orbs -->
  <div class="orb orb--green"></div>
  <div class="orb orb--cyan"></div>
  <div class="orb orb--pink"></div>

  <!-- Decorative liquid glass blobs -->
  <div class="liquid-blob liquid-blob--1"></div>
  <div class="liquid-blob liquid-blob--2"></div>
  <div class="liquid-blob liquid-blob--3"></div>
  <div class="liquid-blob liquid-blob--4"></div>

  <!-- Phase 1: Brand Intro -->
  <div class="brand-intro" id="brandIntro">
    <div class="brand-intro__logo">b<span>l</span></div>
    <div class="brand-intro__name">ble<span>sk</span></div>
    <div class="brand-intro__tagline">Твой блеск. Твои правила.</div>
  </div>

  <!-- Phase 2: Glass card (hidden initially) -->
  <div class="glass-card" id="glassCard">
    <!-- Floating reflections on card -->
    <div class="glass-reflect glass-reflect--1"></div>
    <div class="glass-reflect glass-reflect--2"></div>

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo__icon">b<span>l</span></div>
      <div class="auth-logo__name">ble<span>sk</span></div>
    </div>
    <div class="auth-tagline">Твой блеск. Твои правила.</div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab-indicator" id="tabIndicator" style="left: 3px;"></div>
      <button class="auth-tab auth-tab--active" id="tabLogin" onclick="switchTab('login')">Вход</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Регистрация</button>
    </div>

    <!-- Form -->
    <form id="authForm" onsubmit="return false;">
      <div class="auth-field">
        <label class="auth-label">Имя пользователя</label>
        <div class="auth-input-wrap">
          <input class="auth-input" type="text" placeholder="username" autocomplete="off" spellcheck="false" />
        </div>
      </div>

      <div class="auth-field">
        <label class="auth-label">Пароль</label>
        <div class="auth-input-wrap">
          <input class="auth-input" type="password" placeholder="••••••••" />
        </div>
      </div>

      <div class="auth-field" id="confirmField" style="display: none;">
        <label class="auth-label">Повторите пароль</label>
        <div class="auth-input-wrap">
          <input class="auth-input" type="password" placeholder="••••••••" />
        </div>
      </div>

      <div class="auth-btn-wrap">
        <button class="auth-btn" type="button" id="submitBtn">Войти</button>
      </div>
    </form>

    <div class="auth-footer">blesk v0.1.0-alpha</div>
  </div>
</div>

<div class="version-badge">blesk.fun</div>

<button class="replay-btn" onclick="replay()">↻</button>

<script>
  // Phase 1 → Phase 2 transition
  const INTRO_DURATION = 2800; // ms before intro exits

  function startIntroSequence() {
    const intro = document.getElementById('brandIntro');
    const card = document.getElementById('glassCard');

    // After intro plays, fade it out and show card
    setTimeout(() => {
      intro.classList.add('brand-intro--exit');

      // After exit animation, show the card
      setTimeout(() => {
        intro.style.display = 'none';
        card.classList.add('glass-card--visible');
      }, 600);
    }, INTRO_DURATION);
  }

  // Start on load
  startIntroSequence();

  function switchTab(tab) {
    const indicator = document.getElementById('tabIndicator');
    const loginTab = document.getElementById('tabLogin');
    const registerTab = document.getElementById('tabRegister');
    const confirmField = document.getElementById('confirmField');
    const submitBtn = document.getElementById('submitBtn');

    if (tab === 'login') {
      indicator.style.left = '3px';
      loginTab.classList.add('auth-tab--active');
      registerTab.classList.remove('auth-tab--active');
      confirmField.style.display = 'none';
      submitBtn.textContent = 'Войти';
    } else {
      indicator.style.left = 'calc(50%)';
      registerTab.classList.add('auth-tab--active');
      loginTab.classList.remove('auth-tab--active');
      confirmField.style.display = 'block';
      confirmField.style.animation = 'fieldSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards';
      submitBtn.textContent = 'Создать аккаунт';
    }
  }

  function replay() {
    const scene = document.getElementById('scene');
    const clone = scene.cloneNode(true);
    scene.parentNode.replaceChild(clone, scene);
    clone.id = 'scene';

    // Re-run intro
    setTimeout(() => startIntroSequence(), 50);
  }
</script>

</body>
</html>
