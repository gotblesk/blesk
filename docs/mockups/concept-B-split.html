<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>blesk concept B — Tabs + Split View</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #08060f; color: rgba(255,255,255,0.85); overflow: hidden; height: 100vh; }

  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Title bar */
  .titlebar { height: 32px; background: rgba(14,12,22,0.95); display: flex; align-items: center; padding: 0 12px; -webkit-app-region: drag; flex-shrink: 0; }
  .titlebar__dots { display: flex; gap: 6px; }
  .titlebar__dot { width: 10px; height: 10px; border-radius: 50%; }
  .titlebar__dot--r { background: #ef4444; }
  .titlebar__dot--y { background: #eab308; }
  .titlebar__dot--g { background: #22c55e; }
  .titlebar__title { flex: 1; text-align: center; font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }

  /* Top nav */
  .topbar { height: 52px; display: flex; align-items: center; padding: 0 16px; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
  .nav-pills { display: flex; gap: 4px; padding: 4px; background: rgba(255,255,255,0.04); border-radius: 14px; border: 1px solid rgba(255,255,255,0.06); }
  .nav-pill { padding: 6px 18px; border-radius: 10px; border: none; background: none; color: rgba(255,255,255,0.5); font-size: 11px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .nav-pill--active { background: #c8ff00; color: #08060f; font-weight: 600; box-shadow: 0 0 20px rgba(200,255,0,0.3); }
  .nav-pill:hover:not(.nav-pill--active) { color: rgba(255,255,255,0.8); }

  .topbar__spacer { flex: 1; }
  .topbar__search { padding: 6px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4); font-size: 11px; width: 200px; outline: none; font-family: inherit; }
  .topbar__search:focus { border-color: rgba(200,255,0,0.2); color: rgba(255,255,255,0.8); }
  .topbar__icon { width: 32px; height: 32px; border-radius: 10px; border: none; background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .topbar__avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, hsl(280,70%,55%), hsl(320,60%,45%)); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; cursor: pointer; }

  /* Main split */
  .main { flex: 1; display: flex; min-height: 0; }

  /* Sidebar (chat list) */
  .sidebar { width: 300px; border-right: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar__header { padding: 12px; display: flex; align-items: center; gap: 8px; }
  .sidebar__title { font-size: 13px; font-weight: 600; flex: 1; }
  .sidebar__add { width: 28px; height: 28px; border-radius: 8px; border: none; background: rgba(200,255,0,0.08); color: #c8ff00; cursor: pointer; font-size: 14px; }
  .sidebar__list { flex: 1; overflow-y: auto; padding: 0 6px; }

  .chat-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; cursor: pointer; transition: background 0.12s; }
  .chat-item:hover { background: rgba(255,255,255,0.04); }
  .chat-item--active { background: rgba(200,255,0,0.06); border: 1px solid rgba(200,255,0,0.1); }
  .chat-item__av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #fff; flex-shrink: 0; position: relative; }
  .chat-item__dot { position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; border-radius: 50%; background: #4ade80; border: 2px solid #08060f; }
  .chat-item__info { flex: 1; min-width: 0; }
  .chat-item__name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-item__preview { font-size: 11px; color: rgba(255,255,255,0.35); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-item__meta { text-align: right; flex-shrink: 0; }
  .chat-item__time { font-size: 10px; color: rgba(255,255,255,0.25); }
  .chat-item__badge { background: #c8ff00; color: #08060f; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 8px; margin-top: 4px; display: inline-block; }

  /* Chat panel */
  .panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .panel__header { height: 52px; display: flex; align-items: center; padding: 0 16px; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
  .panel__name { font-size: 14px; font-weight: 600; flex: 1; }
  .panel__status { font-size: 11px; color: #4ade80; }
  .panel__btn { width: 32px; height: 32px; border-radius: 10px; border: none; background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5); cursor: pointer; font-size: 14px; }
  .panel__btn--detach { font-size: 11px; color: rgba(255,255,255,0.3); }
  .panel__btn--detach:hover { color: #c8ff00; }

  .panel__messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; }
  .msg { max-width: 60%; padding: 8px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; animation: msgIn 0.3s ease both; }
  @keyframes msgIn { from { opacity: 0; transform: scale(0.9) translateY(4px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .msg--own { align-self: flex-end; background: rgba(200,255,0,0.12); border: 1px solid rgba(200,255,0,0.15); border-radius: 14px 14px 4px 14px; }
  .msg--other { align-self: flex-start; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px 14px 14px 4px; }
  .msg__time { font-size: 9px; color: rgba(255,255,255,0.25); margin-top: 2px; }

  .panel__input { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-top: 1px solid rgba(255,255,255,0.06); }
  .panel__input-field { flex: 1; padding: 10px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.85); font-size: 13px; outline: none; font-family: inherit; }
  .panel__input-field:focus { border-color: rgba(200,255,0,0.2); }
  .panel__send { width: 36px; height: 36px; border-radius: 50%; border: none; background: #c8ff00; color: #08060f; font-size: 14px; cursor: pointer; }

  /* Voice bar */
  .voicebar { height: 48px; display: flex; align-items: center; padding: 0 16px; gap: 10px; background: rgba(14,12,22,0.95); border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
  .voicebar__signal { color: #4ade80; font-size: 16px; }
  .voicebar__info { flex: 1; }
  .voicebar__name { font-size: 12px; font-weight: 600; }
  .voicebar__count { font-size: 10px; color: rgba(255,255,255,0.3); }
  .voicebar__btn { width: 32px; height: 32px; border-radius: 10px; border: none; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); cursor: pointer; font-size: 12px; }
  .voicebar__btn--end { background: rgba(239,68,68,0.15); color: #ef4444; }

  /* Empty state */
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: rgba(255,255,255,0.3); }
  .empty__icon { font-size: 48px; opacity: 0.3; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
</style>
</head>
<body>
<div class="app">
  <div class="titlebar">
    <div class="titlebar__dots">
      <div class="titlebar__dot titlebar__dot--r"></div>
      <div class="titlebar__dot titlebar__dot--y"></div>
      <div class="titlebar__dot titlebar__dot--g"></div>
    </div>
    <div class="titlebar__title">BLESK</div>
  </div>

  <div class="topbar">
    <div class="nav-pills">
      <button class="nav-pill nav-pill--active" onclick="switchTab(this)">Чаты</button>
      <button class="nav-pill" onclick="switchTab(this)">Каналы</button>
      <button class="nav-pill" onclick="switchTab(this)">Голос</button>
    </div>
    <div class="topbar__spacer"></div>
    <input class="topbar__search" placeholder="Поиск (Ctrl+K)" />
    <button class="topbar__icon" title="Друзья">👥</button>
    <button class="topbar__icon" title="Уведомления">🔔</button>
    <button class="topbar__icon" title="Настройки">⚙</button>
    <div class="topbar__avatar">G</div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar__header">
        <div class="sidebar__title">Чаты</div>
        <button class="sidebar__add">+</button>
      </div>
      <div class="sidebar__list">
        <div class="chat-item chat-item--active" onclick="selectChat(this, 'Vohog')">
          <div class="chat-item__av" style="background: linear-gradient(135deg, hsl(300,70%,55%), hsl(340,60%,45%))">V<div class="chat-item__dot"></div></div>
          <div class="chat-item__info">
            <div class="chat-item__name">Vohog</div>
            <div class="chat-item__preview">дарова</div>
          </div>
          <div class="chat-item__meta">
            <div class="chat-item__time">14 мин</div>
          </div>
        </div>
        <div class="chat-item" onclick="selectChat(this, 'Den')">
          <div class="chat-item__av" style="background: linear-gradient(135deg, hsl(200,70%,55%), hsl(240,60%,45%))">D</div>
          <div class="chat-item__info">
            <div class="chat-item__name">Den</div>
            <div class="chat-item__preview">Закончен эксперимент (7 сек)</div>
          </div>
          <div class="chat-item__meta">
            <div class="chat-item__time">105 мин</div>
            <div class="chat-item__badge">1</div>
          </div>
        </div>
        <div class="chat-item" onclick="selectChat(this, 'blesk team')">
          <div class="chat-item__av" style="background: linear-gradient(135deg, hsl(80,70%,45%), hsl(120,60%,35%))">B</div>
          <div class="chat-item__info">
            <div class="chat-item__name">blesk team</div>
            <div class="chat-item__preview">Егор: обнова на подходе</div>
          </div>
          <div class="chat-item__meta">
            <div class="chat-item__time">2ч</div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" id="chatPanel">
      <div class="panel__header">
        <div class="panel__name" id="panelName">Vohog</div>
        <div class="panel__status">в сети</div>
        <button class="panel__btn">📞</button>
        <button class="panel__btn">📹</button>
        <button class="panel__btn panel__btn--detach" title="Открепить в окно">⧉</button>
      </div>
      <div class="panel__messages">
        <div class="msg msg--other">привет</div>
        <div class="msg msg--other">как дела?</div>
        <div class="msg msg--own">дарова</div>
        <div class="msg msg--own">нормально, работаю над blesk</div>
        <div class="msg msg--other">круто, когда обнова?</div>
        <div class="msg msg--own">скоро, тестирую новый дизайн</div>
      </div>
      <div class="panel__input">
        <input class="panel__input-field" placeholder="Написать сообщение..." />
        <button class="panel__send">→</button>
      </div>
    </div>
  </div>

  <div class="voicebar" style="display:none" id="voicebar">
    <div class="voicebar__signal">📶</div>
    <div class="voicebar__info">
      <div class="voicebar__name">gemoglobin</div>
      <div class="voicebar__count">2 участника</div>
    </div>
    <button class="voicebar__btn">🎤</button>
    <button class="voicebar__btn">🎧</button>
    <button class="voicebar__btn voicebar__btn--end">✕</button>
  </div>
</div>

<script>
function switchTab(el) {
  document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('nav-pill--active'));
  el.classList.add('nav-pill--active');
}
function selectChat(el, name) {
  document.querySelectorAll('.chat-item').forEach(c => c.classList.remove('chat-item--active'));
  el.classList.add('chat-item--active');
  document.getElementById('panelName').textContent = name;
}
</script>
</body>
</html>
