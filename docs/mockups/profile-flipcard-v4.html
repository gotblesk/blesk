<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blesk — Flip Card v4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Manrope', sans-serif;
    background: #08060f;
    color: rgba(255,255,255,0.85);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
  }

  .hint { font-size: 10px; color: rgba(255,255,255,0.1); }

  .scene { width: 380px; height: 560px; perspective: 1400px; }

  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.12s ease-out;
  }
  .card--flip { transition: transform 0.75s cubic-bezier(0.16, 1, 0.3, 1) !important; }

  .face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 24px; overflow: hidden; }

  /* ═══════ FRONT ═══════ */
  .front {
    background: linear-gradient(160deg, #0f172a, #1e1b4b, #3b0764, #581c87);
    display: flex; flex-direction: column;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
  }
  .front__grain { position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events: none; }
  .front__holo { position: absolute; inset: 0; background: conic-gradient(from 0deg at 50% 50%, transparent, rgba(200,255,0,0.015) 60deg, rgba(167,139,250,0.025) 120deg, rgba(56,189,248,0.015) 180deg, transparent 240deg); animation: holoSpin 12s linear infinite; pointer-events: none; z-index: 1; }
  @keyframes holoSpin { to { transform: rotate(360deg); } }
  .front__shimmer { position: absolute; inset: 0; background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.04) 42%, transparent 50%); background-size: 300% 100%; animation: shimmer 4s ease-in-out infinite; pointer-events: none; z-index: 2; }
  @keyframes shimmer { 0%, 100% { background-position: 200% 0; } 50% { background-position: -50% 0; } }
  .front__watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 280px; font-weight: 900; color: rgba(255,255,255,0.015); pointer-events: none; line-height: 0.8; }
  .front__top { display: flex; justify-content: space-between; padding: 22px 22px 0; position: relative; z-index: 3; }
  .front__logo { font-size: 22px; font-weight: 900; color: rgba(200,255,0,0.55); letter-spacing: -0.04em; }
  .front__issue { font-family: 'Space Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.2); text-align: right; }
  .front__body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; position: relative; z-index: 3; }

  /* Avatar — clickable to flip */
  .ava-flip {
    width: 110px; height: 110px; border-radius: 50%;
    background: linear-gradient(135deg, #e879f9, #7c3aed);
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; font-weight: 900; color: #fff;
    box-shadow: 0 16px 50px rgba(0,0,0,0.4), 0 0 0 3px rgba(255,255,255,0.06);
    position: relative; cursor: pointer; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .ava-flip:hover { transform: scale(1.05); box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 3px rgba(200,255,0,0.12); }
  .ava-flip:active { transform: scale(0.97); }

  .ava-flip__ring {
    position: absolute; inset: -4px; border-radius: 50%;
    border: 2px solid transparent;
    background: conic-gradient(from 0deg, #c8ff00, #a78bfa, #38bdf8, #c8ff00) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    animation: ringRot 4s linear infinite; opacity: 0.5;
  }
  @keyframes ringRot { to { transform: rotate(360deg); } }

  /* Hover overlay */
  .ava-flip__label {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.8);
    opacity: 0; transition: opacity 0.2s;
    letter-spacing: 0.02em;
  }
  .ava-flip:hover .ava-flip__label { opacity: 1; }

  .front__name { font-size: 34px; font-weight: 900; letter-spacing: -0.05em; text-shadow: 0 4px 24px rgba(0,0,0,0.5); }
  .front__tag { font-family: 'Space Mono', monospace; font-size: 15px; color: rgba(255,255,255,0.25); margin-top: -8px; }
  .front__status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #4ade80; }
  .front__dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 4px #4ade80; } 50% { box-shadow: 0 0 14px #4ade80; } }

  /* ═══════ BACK ═══════ */
  .back {
    transform: rotateY(180deg);
    background: rgba(14,12,24,0.95);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
  }

  .back__scroll { flex: 1; overflow-y: auto; padding: 0 16px 8px; display: flex; flex-direction: column; gap: 4px; }

  /* Back header — bigger */
  .back__head {
    display: flex; align-items: center; gap: 14px;
    padding: 20px 16px 16px;
  }

  .back__ava-flip {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, #e879f9, #7c3aed);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; color: #fff;
    cursor: pointer; flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .back__ava-flip:hover { transform: scale(1.06); box-shadow: 0 6px 20px rgba(167,139,250,0.2); }
  .back__ava-flip:active { transform: scale(0.95); }

  .back__ava-hint {
    position: absolute; inset: 0; border-radius: 14px;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.7);
    opacity: 0; transition: opacity 0.15s;
  }
  .back__ava-flip:hover .back__ava-hint { opacity: 1; }

  .back__info { flex: 1; }
  .back__name { font-size: 20px; font-weight: 800; letter-spacing: -0.03em; }
  .back__sub { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 2px; }

  .back__sep { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent); margin: 0 4px 8px; }

  /* ═══════ CELLS ═══════ */
  .cell { border-radius: 14px; background: rgba(255,255,255,0.015); overflow: hidden; transition: background 0.12s; }
  .cell:hover { background: rgba(255,255,255,0.03); }

  .cell__main { display: flex; align-items: center; gap: 10px; padding: 12px; cursor: pointer; }

  .cell__ico { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .cell__info { flex: 1; min-width: 0; }
  .cell__key { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.18); text-transform: uppercase; letter-spacing: 0.04em; }
  .cell__val { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .cell__dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .cell__chevron { color: rgba(255,255,255,0.1); font-size: 13px; transition: all 0.2s; flex-shrink: 0; }
  .cell:hover .cell__chevron { color: rgba(255,255,255,0.2); }
  .cell--open .cell__chevron { transform: rotate(90deg); color: rgba(255,255,255,0.3); }

  .cell__drawer { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.16, 1, 0.3, 1), padding 0.35s; padding: 0 12px; }
  .cell--open .cell__drawer { max-height: 220px; padding: 0 12px 12px; }

  .cell__drawer-inner { padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.03); display: flex; flex-direction: column; gap: 6px; }

  .cell__input { width: 100%; padding: 9px 11px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.7); font-size: 12px; font-family: inherit; outline: none; transition: border-color 0.15s; }
  .cell__input::placeholder { color: rgba(255,255,255,0.12); }
  .cell__input:focus { border-color: rgba(200,255,0,0.2); }

  .cell__drawer-hint { font-size: 10px; color: rgba(255,255,255,0.15); }
  .cell__drawer-row { display: flex; gap: 6px; }

  .cell__btn { padding: 7px 14px; border-radius: 8px; border: none; font-size: 11px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.12s; }
  .cell__btn--go { background: rgba(200,255,0,0.1); color: #c8ff00; }
  .cell__btn--go:hover { background: rgba(200,255,0,0.18); }
  .cell__btn--x { background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.3); }
  .cell__btn--x:hover { background: rgba(255,255,255,0.06); }

  /* Bio */
  .back__bio { padding: 10px 12px; border-radius: 14px; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.03); margin-top: 4px; }
  .back__bio-ta { width: 100%; border: none; background: none; color: rgba(255,255,255,0.35); font-size: 12.5px; font-family: inherit; font-style: italic; line-height: 1.5; resize: none; outline: none; }
  .back__bio-ta::placeholder { color: rgba(255,255,255,0.1); }
  .back__bio-ta:focus { color: rgba(255,255,255,0.6); }
  .back__bio-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .back__bio-n { font-family: 'Space Mono', monospace; font-size: 8px; color: rgba(255,255,255,0.08); }

  .back__save { margin-top: auto; padding: 12px; border-radius: 14px; border: none; background: #c8ff00; color: #000; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: box-shadow 0.12s; position: relative; overflow: hidden; }
  .back__save:hover { box-shadow: 0 4px 16px rgba(200,255,0,0.2); }
  .back__save::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); animation: shine 2.5s ease-in-out infinite; }
  @keyframes shine { 0% { left: -100%; } 50%, 100% { left: 200%; } }

  .back__home { width: 90px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.06); margin: 10px auto 8px; }
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="card" id="card">
    <!-- FRONT -->
    <div class="face front">
      <div class="front__grain"></div>
      <div class="front__holo"></div>
      <div class="front__shimmer"></div>
      <div class="front__watermark">G</div>
      <div class="front__top">
        <div class="front__logo">blesk</div>
        <div class="front__issue">ISSUE #0000<br>MARCH 2026</div>
      </div>
      <div class="front__body">
        <div class="ava-flip" onclick="doFlip()">
          <div class="ava-flip__ring"></div>
          G
          <div class="ava-flip__label">Редактировать →</div>
        </div>
        <div class="front__name">gotblesk</div>
        <div class="front__tag">#0000</div>
        <div class="front__status"><div class="front__dot"></div> В сети</div>
      </div>
    </div>

    <!-- BACK -->
    <div class="face back">
      <div class="back__head">
        <div class="back__ava-flip" onclick="doFlip()">
          G
          <div class="back__ava-hint">← Назад</div>
        </div>
        <div class="back__info">
          <div class="back__name">gotblesk</div>
          <div class="back__sub">#0000 · с марта 2026</div>
        </div>
      </div>
      <div class="back__sep"></div>
      <div class="back__scroll">
        <div class="cell" id="cEmail">
          <div class="cell__main" onclick="toggle('cEmail')">
            <div class="cell__ico" style="background:rgba(74,222,128,0.08);color:#4ade80;">✉</div>
            <div class="cell__info">
              <div class="cell__key">Email</div>
              <div class="cell__val">mxkarov@mail.ru <div class="cell__dot" style="background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,0.4);"></div></div>
            </div>
            <span class="cell__chevron">›</span>
          </div>
          <div class="cell__drawer"><div class="cell__drawer-inner"><div class="cell__drawer-hint">Email подтверждён</div></div></div>
        </div>

        <div class="cell" id="cPhone">
          <div class="cell__main" onclick="toggle('cPhone')">
            <div class="cell__ico" style="background:rgba(245,158,11,0.06);color:#f59e0b;">📱</div>
            <div class="cell__info">
              <div class="cell__key">Телефон</div>
              <div class="cell__val" style="opacity:0.3;">Не привязан</div>
            </div>
            <span class="cell__chevron">›</span>
          </div>
          <div class="cell__drawer"><div class="cell__drawer-inner"><div class="cell__drawer-hint">Привязка скоро будет доступна</div></div></div>
        </div>

        <div class="cell" id="cPass">
          <div class="cell__main" onclick="toggle('cPass')">
            <div class="cell__ico" style="background:rgba(200,255,0,0.05);color:#c8ff00;">🔒</div>
            <div class="cell__info">
              <div class="cell__key">Пароль</div>
              <div class="cell__val">●●●●●●●●</div>
            </div>
            <span class="cell__chevron">›</span>
          </div>
          <div class="cell__drawer">
            <div class="cell__drawer-inner">
              <input class="cell__input" type="password" placeholder="Текущий пароль" onclick="event.stopPropagation()">
              <input class="cell__input" type="password" placeholder="Новый (мин. 8)" onclick="event.stopPropagation()">
              <input class="cell__input" type="password" placeholder="Повторите" onclick="event.stopPropagation()">
              <input class="cell__input" placeholder="Код из email" maxlength="6" onclick="event.stopPropagation()">
              <div class="cell__drawer-row">
                <button class="cell__btn cell__btn--go" onclick="event.stopPropagation()">Подтвердить</button>
                <button class="cell__btn cell__btn--x" onclick="event.stopPropagation();toggle('cPass')">Отмена</button>
              </div>
            </div>
          </div>
        </div>

        <div class="back__bio">
          <textarea class="back__bio-ta" rows="2" placeholder="О себе..." onclick="event.stopPropagation()">Дизайнер, создатель blesk.</textarea>
          <div class="back__bio-bar"><span class="back__bio-n">42/200</span></div>
        </div>

        <button class="back__save" onclick="event.stopPropagation()">Сохранить</button>
      </div>
      <div class="back__home"></div>
    </div>
  </div>
</div>

<div class="hint">Нажми на аватар чтобы перевернуть · Двигай мышь для 3D</div>

<script>
  const scene = document.getElementById('scene');
  const card = document.getElementById('card');
  let flipped = false;
  let tiltX = 0, tiltY = 0;

  function doFlip() {
    flipped = !flipped;
    card.classList.add('card--flip');
    update();
    setTimeout(() => card.classList.remove('card--flip'), 800);
  }

  function toggle(id) { document.getElementById(id).classList.toggle('cell--open'); }

  scene.addEventListener('mousemove', (e) => {
    const r = scene.getBoundingClientRect();
    tiltX = ((e.clientX - r.left) / r.width - 0.5) * 7;
    tiltY = -((e.clientY - r.top) / r.height - 0.5) * 4;
    update();
  });

  scene.addEventListener('mouseleave', () => { tiltX = 0; tiltY = 0; update(); });

  function update() {
    card.style.transform = `rotateY(${(flipped ? 180 : 0) + tiltX}deg) rotateX(${tiltY}deg)`;
  }
</script>
</body>
</html>
